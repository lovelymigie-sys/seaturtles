<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海龜不吃塑！</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- 引入 Babel 來編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #38bdf8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- 自訂 SVG 圖示元件 ---
        // 更新：更真實的海龜造型，並支援自訂顏色
        const Turtle = ({ className, baseColor = "#4ade80", shellColor = "#166534", scuteColor = "#064e3b", skinDetail = "#22c55e", emotion = "normal" }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-lg ${className}`} style={{ filter: 'drop-shadow(2px 4px 6px rgba(0,0,0,0.4))' }}>
            {/* 前肢 (Front Flippers) */}
            <path d="M 40 30 C 15 10 0 35 15 55 C 25 60 35 40 40 35 Z" fill={baseColor} />
            <path d="M 60 30 C 85 10 100 35 85 55 C 75 60 65 40 60 35 Z" fill={baseColor} />
            
            {/* 後肢 (Back Flippers) */}
            <path d="M 35 65 C 15 80 20 95 35 85 C 45 80 40 70 35 65 Z" fill={baseColor} />
            <path d="M 65 65 C 85 80 80 95 65 85 C 55 80 60 70 65 65 Z" fill={baseColor} />

            {/* 尾巴 (Tail) */}
            <path d="M 45 75 L 50 92 L 55 75 Z" fill={baseColor} />

            {/* 頭部 (Head) */}
            <path d="M 42 25 C 40 5 60 5 58 25 Z" fill={baseColor} />
            
            {/* 眼睛與表情 (Eyes & Emotion) */}
            {emotion === 'normal' && (
              <>
                <circle cx="46" cy="14" r="2" fill="#111" />
                <circle cx="54" cy="14" r="2" fill="#111" />
                <circle cx="45.5" cy="13.5" r="0.8" fill="#fff" />
                <circle cx="53.5" cy="13.5" r="0.8" fill="#fff" />
              </>
            )}
            {emotion === 'happy' && (
              <>
                <path d="M 44 14 Q 46 11 48 14" stroke="#111" strokeWidth="1.5" fill="none" strokeLinecap="round" />
                <path d="M 52 14 Q 54 11 56 14" stroke="#111" strokeWidth="1.5" fill="none" strokeLinecap="round" />
                <circle cx="43" cy="16" r="1.5" fill="#fda4af" opacity="0.8" />
                <circle cx="57" cy="16" r="1.5" fill="#fda4af" opacity="0.8" />
              </>
            )}
            {emotion === 'sad' && (
              <>
                <path d="M 44 14 Q 46 12 48 15" stroke="#111" strokeWidth="1.5" fill="none" strokeLinecap="round" />
                <path d="M 52 15 Q 54 12 56 14" stroke="#111" strokeWidth="1.5" fill="none" strokeLinecap="round" />
                <path d="M 45 16 L 45 22 M 55 16 L 55 22" stroke="#60a5fa" strokeWidth="1.5" strokeLinecap="round" strokeDasharray="2 2" />
              </>
            )}
            {emotion === 'crying' && (
              <>
                {/* 緊閉雙眼 */}
                <path d="M 43 14 L 47 16 M 53 16 L 57 14" stroke="#111" strokeWidth="1.5" strokeLinecap="round" />
                <path d="M 44 14 Q 46 12 48 15" stroke="#111" strokeWidth="1.5" fill="none" strokeLinecap="round" />
                <path d="M 52 15 Q 54 12 56 14" stroke="#111" strokeWidth="1.5" fill="none" strokeLinecap="round" />
                {/* 淚滴 */}
                <path d="M 45 18 C 42 24 48 24 45 18 Z" fill="#60a5fa" opacity="0.9"/>
                <path d="M 55 18 C 52 24 58 24 55 18 Z" fill="#60a5fa" opacity="0.9"/>
              </>
            )}

            {/* 四肢皮膚紋理 (Skin Details) */}
            <path d="M 22 35 L 18 40 M 28 40 L 22 46 M 15 48 L 18 52" stroke={skinDetail} strokeWidth="1.5" strokeLinecap="round" opacity="0.6"/>
            <path d="M 78 35 L 82 40 M 72 40 L 78 46 M 85 48 L 82 52" stroke={skinDetail} strokeWidth="1.5" strokeLinecap="round" opacity="0.6"/>

            {/* 龜殼外圈 (Shell Outer) */}
            <ellipse cx="50" cy="50" rx="28" ry="34" fill={shellColor} />
            
            {/* 龜殼內圈邊界 (Shell Inner Rim) */}
            <ellipse cx="50" cy="50" rx="24" ry="30" fill={scuteColor} />

            {/* 龜殼真實盾板紋路 (Scutes Hexagon Pattern) */}
            <path d="M 50 22 L 58 30 L 58 42 L 50 48 L 42 42 L 42 30 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 50 48 L 58 54 L 58 66 L 50 74 L 42 66 L 42 54 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 42 30 L 30 36 L 28 48 L 42 42 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 58 30 L 70 36 L 72 48 L 58 42 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 42 66 L 30 60 L 28 48 L 42 54 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
            <path d="M 58 66 L 70 60 L 72 48 L 58 54 Z" fill={shellColor} stroke={scuteColor} strokeWidth="2.5" strokeLinejoin="round" />
          </svg>
        );

        const Jellyfish = ({ className }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-md ${className}`}>
            <path d="M 30 50 Q 20 70 30 90 T 20 100" stroke="#f472b6" strokeWidth="3" fill="none" opacity="0.8" />
            <path d="M 50 50 Q 40 80 50 95 T 50 100" stroke="#db2777" strokeWidth="4" fill="none" opacity="0.9" />
            <path d="M 70 50 Q 80 70 70 90 T 80 100" stroke="#f472b6" strokeWidth="3" fill="none" opacity="0.8" />
            <path d="M 15 50 C 15 10 85 10 85 50 C 85 55 15 55 15 50 Z" fill="url(#jellyGrad)" opacity="0.9" />
            <defs>
              <radialGradient id="jellyGrad" cx="50%" cy="40%" r="50%" fx="50%" fy="30%">
                <stop offset="0%" stopColor="#ffffff" stopOpacity="0.9" />
                <stop offset="40%" stopColor="#f472b6" stopOpacity="0.8" />
                <stop offset="70%" stopColor="#be185d" stopOpacity="0.7" />
                <stop offset="100%" stopColor="#831843" stopOpacity="0.5" />
              </radialGradient>
            </defs>
          </svg>
        );

        const LongTentacleJellyfish = ({ className }) => (
          <svg viewBox="0 0 100 200" className={`drop-shadow-md ${className}`}>
            {/* 超長觸手 (加長版) */}
            <path d="M 30 50 Q 15 110 25 160 T 15 195" stroke="#c084fc" strokeWidth="2" fill="none" opacity="0.8" />
            <path d="M 40 50 Q 25 120 40 170 T 30 200" stroke="#9333ea" strokeWidth="2.5" fill="none" opacity="0.9" />
            <path d="M 50 50 Q 65 110 50 155 T 55 195" stroke="#7e22ce" strokeWidth="3" fill="none" opacity="0.9" />
            <path d="M 60 50 Q 75 120 60 170 T 70 200" stroke="#9333ea" strokeWidth="2.5" fill="none" opacity="0.9" />
            <path d="M 70 50 Q 85 110 75 160 T 85 195" stroke="#c084fc" strokeWidth="2" fill="none" opacity="0.8" />
            
            {/* 傘狀頭部 */}
            <path d="M 20 50 C 20 15 80 15 80 50 C 80 55 20 55 20 50 Z" fill="url(#longJellyGrad)" opacity="0.9" />
            <defs>
              <radialGradient id="longJellyGrad" cx="50%" cy="40%" r="50%" fx="50%" fy="30%">
                <stop offset="0%" stopColor="#ffffff" stopOpacity="0.9" />
                <stop offset="40%" stopColor="#a855f7" stopOpacity="0.8" />
                <stop offset="70%" stopColor="#6b21a8" stopOpacity="0.7" />
                <stop offset="100%" stopColor="#3b0764" stopOpacity="0.5" />
              </radialGradient>
            </defs>
          </svg>
        );

        const EggYolkJellyfish = ({ className }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-md ${className}`}>
            {/* 短短的叢生觸手 */}
            <path d="M 35 50 Q 30 70 40 85" stroke="#c084fc" strokeWidth="4" strokeLinecap="round" fill="none" opacity="0.8" />
            <path d="M 45 50 Q 40 75 50 90" stroke="#60a5fa" strokeWidth="5" strokeLinecap="round" fill="none" opacity="0.9" />
            <path d="M 50 50 Q 55 80 55 95" stroke="#818cf8" strokeWidth="6" strokeLinecap="round" fill="none" opacity="0.9" />
            <path d="M 55 50 Q 60 75 60 90" stroke="#34d399" strokeWidth="5" strokeLinecap="round" fill="none" opacity="0.8" />
            <path d="M 65 50 Q 70 70 60 85" stroke="#c084fc" strokeWidth="4" strokeLinecap="round" fill="none" opacity="0.8" />
            
            {/* 扁平的透明傘蓋 */}
            <ellipse cx="50" cy="50" rx="40" ry="18" fill="#ffffff" opacity="0.5" />
            <ellipse cx="50" cy="50" rx="35" ry="15" fill="#f8fafc" opacity="0.6" />
            
            {/* 蛋黃中心 */}
            <ellipse cx="50" cy="46" rx="18" ry="12" fill="url(#eggYolkGrad)" />
            <ellipse cx="46" cy="43" rx="6" ry="4" fill="#ffffff" opacity="0.4" />
            
            <defs>
              <radialGradient id="eggYolkGrad" cx="50%" cy="40%" r="50%" fx="40%" fy="30%">
                <stop offset="0%" stopColor="#fef08a" stopOpacity="1" />
                <stop offset="60%" stopColor="#f59e0b" stopOpacity="0.9" />
                <stop offset="100%" stopColor="#b45309" stopOpacity="0.8" />
              </radialGradient>
            </defs>
          </svg>
        );

        const Fish = ({ className, color1, color2 }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-md ${className}`}>
            <path d="M 80 50 L 100 20 L 90 50 L 100 80 Z" fill={color2} />
            <ellipse cx="45" cy="50" rx="40" ry="25" fill={color1} />
            <circle cx="20" cy="45" r="4" fill="#000" />
            <circle cx="22" cy="43" r="1.5" fill="#fff" />
            <path d="M 40 25 Q 50 10 60 25 Z" fill={color2} />
            <path d="M 40 75 Q 50 90 60 75 Z" fill={color2} />
            <path d="M 45 30 Q 55 50 45 70 Q 65 50 45 30" fill={color2} opacity="0.6" />
          </svg>
        );

        const TropicalFish = ({ className, hue, type = 1 }) => (
          <svg viewBox="0 0 120 100" className={`drop-shadow-xl ${className}`}>
            <defs>
              <linearGradient id={`grad-${hue}`} x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stopColor={`hsl(${hue}, 90%, 65%)`} />
                <stop offset="50%" stopColor={`hsl(${(hue + 60) % 360}, 90%, 55%)`} />
                <stop offset="100%" stopColor={`hsl(${(hue + 120) % 360}, 90%, 45%)`} />
              </linearGradient>
            </defs>
            {type === 1 && (
              <>
                {/* 上下鰭 */}
                <path d="M 50 50 L 30 10 L 70 50 Z" fill={`hsl(${hue}, 90%, 50%)`} />
                <path d="M 50 50 L 40 90 L 70 50 Z" fill={`hsl(${hue}, 90%, 50%)`} />
                {/* 尾鰭 */}
                <path d="M 80 50 L 115 20 L 105 50 L 115 80 Z" fill={`hsl(${(hue + 60) % 360}, 90%, 60%)`} />
                {/* 身體 */}
                <ellipse cx="50" cy="50" rx="45" ry="35" fill={`url(#grad-${hue})`} />
                {/* 條紋 */}
                <path d="M 35 20 Q 25 50 35 80" stroke="#fff" strokeWidth="4" fill="none" opacity="0.5"/>
                <path d="M 55 16 Q 45 50 55 84" stroke="#fff" strokeWidth="4" fill="none" opacity="0.5"/>
                <path d="M 75 25 Q 65 50 75 75" stroke="#fff" strokeWidth="4" fill="none" opacity="0.5"/>
                {/* 眼睛 */}
                <circle cx="25" cy="40" r="5" fill="#111" />
                <circle cx="27" cy="38" r="2" fill="#fff" />
                {/* 嘴巴 */}
                <path d="M 5 50 Q 15 55 10 60" stroke="#fff" strokeWidth="2" fill="none" />
              </>
            )}
            {type === 2 && (
              <>
                {/* 燕魚 / 神仙魚形狀 */}
                <path d="M 60 50 L 30 0 L 80 50 Z" fill={`hsl(${hue}, 90%, 50%)`} />
                <path d="M 60 50 L 30 100 L 80 50 Z" fill={`hsl(${hue}, 90%, 50%)`} />
                <path d="M 90 50 L 120 20 L 105 50 L 120 80 Z" fill={`hsl(${(hue + 60) % 360}, 90%, 60%)`} />
                <path d="M 20 50 L 60 20 L 100 50 L 60 80 Z" fill={`url(#grad-${hue})`} />
                <path d="M 40 30 L 40 70 M 60 25 L 60 75 M 80 35 L 80 65" stroke="#fff" strokeWidth="4" fill="none" opacity="0.4"/>
                <circle cx="35" cy="45" r="4" fill="#111" />
                <circle cx="36" cy="44" r="1.5" fill="#fff" />
                <path d="M 15 50 L 25 50" stroke="#fff" strokeWidth="2" />
              </>
            )}
            {type === 3 && (
              <>
                {/* 圓胖河豚形狀 */}
                <path d="M 80 50 L 115 30 L 100 50 L 115 70 Z" fill={`hsl(${(hue + 60) % 360}, 90%, 60%)`} />
                <circle cx="55" cy="50" r="40" fill={`url(#grad-${hue})`} />
                {/* 刺刺與斑點 */}
                <circle cx="45" cy="30" r="4" fill="#fff" opacity="0.5" />
                <circle cx="70" cy="40" r="6" fill="#fff" opacity="0.5" />
                <circle cx="50" cy="70" r="5" fill="#fff" opacity="0.5" />
                <circle cx="75" cy="65" r="3" fill="#fff" opacity="0.5" />
                <path d="M 55 10 L 55 2 M 35 15 L 30 8 M 75 15 L 80 8 M 55 90 L 55 98 M 35 85 L 30 92 M 75 85 L 80 92" stroke={`hsl(${hue}, 90%, 30%)`} strokeWidth="4" strokeLinecap="round" opacity="0.8" />
                {/* 眼睛與嘴巴 */}
                <circle cx="30" cy="45" r="5" fill="#111" />
                <circle cx="31" cy="43" r="2" fill="#fff" />
                <path d="M 10 55 Q 20 65 15 70" stroke="#fff" strokeWidth="3" fill="none" strokeLinecap="round"/>
              </>
            )}
          </svg>
        );

        const Mermaid = ({ className }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-2xl ${className}`}>
            {/* 魔法光暈 */}
            <circle cx="50" cy="50" r="45" fill="url(#mermaidGlow)" opacity="0.3" />
            <defs>
              <radialGradient id="mermaidGlow" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stopColor="#fdf4ff" stopOpacity="1" />
                <stop offset="100%" stopColor="#fdf4ff" stopOpacity="0" />
              </radialGradient>
              {/* 童話風漸層魚尾 */}
              <linearGradient id="tailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stopColor="#67e8f9" />
                <stop offset="100%" stopColor="#8b5cf6" />
              </linearGradient>
              {/* 金色頭髮漸層 */}
              <linearGradient id="hairGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stopColor="#fef08a" />
                <stop offset="100%" stopColor="#eab308" />
              </linearGradient>
            </defs>

            {/* 後方波浪大捲髮 */}
            <path d="M 40 10 C 20 10 15 30 25 45 C 15 60 25 80 40 85 C 50 88 65 85 75 75 C 85 60 85 40 75 30 C 80 15 60 10 40 10 Z" fill="url(#hairGrad)" />
            <path d="M 40 15 C 25 15 22 30 30 42 C 22 55 30 70 42 75 C 50 78 60 75 68 68 C 75 58 75 42 68 32 C 70 20 55 15 40 15 Z" fill="#ca8a04" opacity="0.3" />

            {/* 魚尾巴身體 */}
            <path d="M 45 55 Q 30 75 15 85 Q 35 90 55 55 Z" fill="url(#tailGrad)" />
            {/* 魚尾鰭 */}
            <path d="M 15 85 C 5 75 0 70 5 60 C 10 70 12 75 15 85 Z" fill="#8b5cf6" opacity="0.9" />
            <path d="M 15 85 C 5 95 0 100 10 100 C 12 95 14 90 15 85 Z" fill="#c4b5fd" opacity="0.9" />

            {/* 身體軀幹 */}
            <path d="M 42 35 Q 40 45 45 56 L 55 56 Q 60 45 58 35 Z" fill="#ffedd5" />
            
            {/* 粉色貝殼胸罩 */}
            <path d="M 41 42 C 41 38 49 38 48 44 C 47 38 55 38 55 42 C 55 48 48 52 48 52 C 48 52 41 48 41 42 Z" fill="#f472b6" />

            {/* 頭部與臉 */}
            <circle cx="50" cy="25" r="11" fill="#ffedd5" />
            {/* 腮紅 */}
            <circle cx="43" cy="28" r="2.5" fill="#fda4af" opacity="0.8" />
            <circle cx="57" cy="28" r="2.5" fill="#fda4af" opacity="0.8" />
            {/* 開心閉眼 */}
            <path d="M 42 25 Q 44 23 46 25" stroke="#78350f" strokeWidth="1.5" fill="none" strokeLinecap="round" />
            <path d="M 54 25 Q 56 23 58 25" stroke="#78350f" strokeWidth="1.5" fill="none" strokeLinecap="round" />
            {/* 甜美微笑 */}
            <path d="M 48 30 Q 50 33 52 30" stroke="#78350f" strokeWidth="1.5" fill="none" strokeLinecap="round" />

            {/* 前方瀏海與垂下來的捲髮 */}
            <path d="M 39 25 C 39 15 50 10 61 25 C 55 15 45 15 39 25 Z" fill="#fef08a" />
            <path d="M 39 20 Q 30 35 35 50 Q 45 45 42 25 Z" fill="url(#hairGrad)" />
            <path d="M 61 20 Q 70 35 65 50 Q 55 45 58 25 Z" fill="url(#hairGrad)" />
            
            {/* 捲髮的紋理線條 */}
            <path d="M 25 45 C 30 50 20 60 30 65" stroke="#ca8a04" strokeWidth="2" fill="none" strokeLinecap="round" opacity="0.6"/>
            <path d="M 70 35 C 65 40 75 50 65 55" stroke="#ca8a04" strokeWidth="2" fill="none" strokeLinecap="round" opacity="0.6"/>
            <path d="M 35 50 C 38 55 32 60 38 65" stroke="#ca8a04" strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.6"/>

            {/* 紅色海星髮飾 */}
            <path d="M 58 15 L 60 19 L 65 19 L 61 22 L 63 26 L 58 23 L 53 26 L 55 22 L 51 19 L 56 19 Z" fill="#f43f5e" />
            <circle cx="58" cy="21" r="1" fill="#fff" opacity="0.8" />
          </svg>
        );

        const Starfish = ({ className, color = "#f43f5e" }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-lg ${className}`}>
            <path d="M 50 10 L 62 38 L 92 38 L 68 56 L 77 85 L 50 68 L 23 85 L 32 56 L 8 38 L 38 38 Z" fill={color} />
            <circle cx="50" cy="50" r="3" fill="#fff" opacity="0.6"/>
            <circle cx="50" cy="38" r="2" fill="#fff" opacity="0.6"/>
            <circle cx="40" cy="58" r="2" fill="#fff" opacity="0.6"/>
            <circle cx="60" cy="58" r="2" fill="#fff" opacity="0.6"/>
            <circle cx="50" cy="68" r="2" fill="#fff" opacity="0.6"/>
          </svg>
        );

        const Lobster = ({ className }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-lg ${className}`}>
            {/* 觸角 */}
            <path d="M 75 40 Q 90 20 95 35" stroke="#ef4444" strokeWidth="2" fill="none" strokeLinecap="round" />
            <path d="M 75 60 Q 90 80 95 65" stroke="#ef4444" strokeWidth="2" fill="none" strokeLinecap="round" />
            
            {/* 腳 */}
            <path d="M 40 30 L 35 15" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            <path d="M 50 30 L 45 15" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            <path d="M 60 30 L 55 15" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            
            <path d="M 40 70 L 35 85" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            <path d="M 50 70 L 45 85" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            <path d="M 60 70 L 55 85" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />

            {/* 身體主幹 */}
            <path d="M 25 50 Q 50 30 75 45 L 75 55 Q 50 70 25 50 Z" fill="#ef4444" />
            
            {/* 尾巴 */}
            <path d="M 25 50 Q 10 35 5 50 Q 10 65 25 50 Z" fill="#dc2626" />
            
            {/* 身體紋路 */}
            <path d="M 45 38 L 45 62" stroke="#b91c1c" strokeWidth="2" fill="none" opacity="0.5" />
            <path d="M 55 40 L 55 60" stroke="#b91c1c" strokeWidth="2" fill="none" opacity="0.5" />
            <path d="M 65 42 L 65 58" stroke="#b91c1c" strokeWidth="2" fill="none" opacity="0.5" />

            {/* 大螯 (上) */}
            <path d="M 65 35 Q 85 10 95 25 Q 80 35 65 35" fill="#ef4444" />
            <path d="M 95 25 L 85 28" stroke="#dc2626" strokeWidth="2" fill="none" />
            
            {/* 大螯 (下) */}
            <path d="M 65 65 Q 85 90 95 75 Q 80 65 65 65" fill="#ef4444" />
            <path d="M 95 75 L 85 72" stroke="#dc2626" strokeWidth="2" fill="none" />

            {/* 眼睛 */}
            <circle cx="72" cy="42" r="3" fill="#000" />
            <circle cx="73" cy="41" r="1" fill="#fff" />
            <circle cx="72" cy="58" r="3" fill="#000" />
            <circle cx="73" cy="57" r="1" fill="#fff" />
          </svg>
        );

        const Crab = ({ className }) => (
          <svg viewBox="0 0 100 100" className={`drop-shadow-lg ${className}`}>
            {/* 腳 */}
            <path d="M 30 60 Q 15 70 20 85" stroke="#ef4444" strokeWidth="4" fill="none" strokeLinecap="round" />
            <path d="M 40 65 Q 25 75 30 90" stroke="#ef4444" strokeWidth="4" fill="none" strokeLinecap="round" />
            <path d="M 70 60 Q 85 70 80 85" stroke="#ef4444" strokeWidth="4" fill="none" strokeLinecap="round" />
            <path d="M 60 65 Q 75 75 70 90" stroke="#ef4444" strokeWidth="4" fill="none" strokeLinecap="round" />
            
            {/* 大螯 */}
            <path d="M 35 45 Q 15 30 20 15 Q 35 25 35 45" fill="#ef4444" />
            <path d="M 20 15 Q 25 5 35 15" fill="#ef4444" />
            <path d="M 65 45 Q 85 30 80 15 Q 65 25 65 45" fill="#ef4444" />
            <path d="M 80 15 Q 75 5 65 15" fill="#ef4444" />
            
            {/* 身體 */}
            <ellipse cx="50" cy="55" rx="30" ry="20" fill="#f87171" />
            <ellipse cx="50" cy="50" rx="25" ry="15" fill="#ef4444" />
            
            {/* 眼睛 */}
            <path d="M 40 40 L 35 25" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            <path d="M 60 40 L 65 25" stroke="#ef4444" strokeWidth="3" fill="none" strokeLinecap="round" />
            <circle cx="35" cy="22" r="5" fill="#fff" />
            <circle cx="35" cy="22" r="2" fill="#000" />
            <circle cx="65" cy="22" r="5" fill="#fff" />
            <circle cx="65" cy="22" r="2" fill="#000" />
            
            {/* 腮紅 & 微笑 */}
            <circle cx="35" cy="55" r="4" fill="#fca5a5" opacity="0.8" />
            <circle cx="65" cy="55" r="4" fill="#fca5a5" opacity="0.8" />
            <path d="M 45 58 Q 50 63 55 58" stroke="#7f1d1d" strokeWidth="2" fill="none" strokeLinecap="round" />
          </svg>
        );

        const PlasticBag = ({ className, onClick, style }) => (
          <div onClick={onClick} className={`cursor-pointer transform hover:scale-110 transition-transform ${className}`} style={style}>
            <svg viewBox="0 0 100 100" className="drop-shadow-sm w-full h-full">
              <path d="M 30 30 C 30 10 45 10 40 30" stroke="#e5e7eb" strokeWidth="4" fill="none" opacity="0.8" />
              <path d="M 70 30 C 70 10 55 10 60 30" stroke="#e5e7eb" strokeWidth="4" fill="none" opacity="0.8" />
              <path d="M 25 30 L 75 30 L 80 80 Q 50 95 20 80 Z" fill="rgba(255, 255, 255, 0.6)" stroke="#d1d5db" strokeWidth="2" />
              <path d="M 35 30 L 30 70" stroke="#f3f4f6" strokeWidth="2" fill="none" opacity="0.7" />
              <path d="M 65 30 L 60 75" stroke="#f3f4f6" strokeWidth="2" fill="none" opacity="0.7" />
              <path d="M 45 40 L 55 60" stroke="#ffffff" strokeWidth="3" fill="none" opacity="0.9" />
            </svg>
          </div>
        );

        // --- 遊戲主程式 ---
        function App() {
          const [gameState, setGameState] = useState('start');
          const [timeLeft, setTimeLeft] = useState(30);
          const [bags, setBags] = useState([]);
          const [isMusicOn, setIsMusicOn] = useState(true);
          const audioRef = useRef(null);
          const audioCtxRef = useRef(null); // 新增：共用的音效引擎
          
          const turtles = useRef([...Array(4)].map((_, index) => {
            // 預設綠色海龜主題
            let theme = {
              baseColor: "#4ade80", 
              skinDetail: "#22c55e",
              shellColor: "#166534", 
              scuteColor: "#064e3b"
            };
            
            // 將第3隻海龜 (index 2) 變成紅色的
            if (index === 2) {
              theme = {
                baseColor: "#fca5a5", // 粉紅色皮膚
                skinDetail: "#ef4444", // 紅色紋理
                shellColor: "#9f1239", // 深紅色龜殼
                scuteColor: "#4c0519"  // 極深紅縫隙
              };
            }

            // 規劃 4 個不同的高度區間 (游道)，避免海龜重疊
            const laneStep = 15; // 每個游道佔 15% 的高度
            const topPosition = 10 + index * laneStep + Math.random() * 5;
            
            // 錯開出發的初始時間，避免剛開始擠在同一個水平線上
            const delay = index * 10 + Math.random() * 5;

            return {
              id: Math.random(),
              top: `${topPosition}%`,
              animationDuration: `${Math.random() * 25 + 30}s`, // 大幅放慢海龜游動速度
              animationDelay: `-${delay}s`,
              scale: Math.random() * 0.5 + 1.2, // 海龜變大隻 (原本是 0.5 + 0.8)
              theme: theme
            };
          }));

          const jellyfishes = useRef([...Array(15)].map(() => {
            // 隨機決定水母種類，加入長觸手和蛋黃水母
            const types = ['normal', 'normal', 'normal', 'long', 'egg'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            // 決定水母顏色深度：部分水母顏色變深且飽和度高
            const isDeep = Math.random() > 0.6;
            const opacity = isDeep ? (Math.random() * 0.2 + 0.8) : (Math.random() * 0.3 + 0.4);
            const saturate = isDeep ? `saturate(${Math.random() * 1.5 + 1.5})` : 'saturate(1)';
            
            return {
              id: Math.random(),
              type: type, // 紀錄種類
              left: `${Math.random() * 80 + 10}%`,
              top: `${Math.random() * 60 + 20}%`,
              animClass: `drift-anim-${Math.floor(Math.random() * 4) + 1}`,
              animationDuration: `${Math.random() * 15 + 15}s`, // 改為 15~30 秒，大幅減緩游動速度
              animationDelay: `-${Math.random() * 10}s`,
              scale: type === 'egg' ? Math.random() * 0.4 + 0.5 : Math.random() * 0.6 + 0.3,
              // 蛋黃水母不改變色相，保持蛋黃色
              hueRotate: type === 'egg' ? '0deg' : `${Math.floor(Math.random() * 360)}deg`,
              opacity: opacity,
              saturate: type === 'egg' ? 'saturate(1)' : saturate // 蛋黃水母維持原彩度
            };
          }));

          const fishes = useRef([...Array(8)].map(() => {
            const colors = [
              { c1: '#f97316', c2: '#fff' },
              { c1: '#facc15', c2: '#3b82f6' },
              { c1: '#ec4899', c2: '#fbcfe8' },
              { c1: '#a855f7', c2: '#fde047' }
            ];
            const color = colors[Math.floor(Math.random() * colors.length)];
            return {
              id: Math.random(),
              top: `${Math.random() * 70 + 10}%`,
              animationDuration: `${Math.random() * 20 + 25}s`, // 放慢小魚游動速度，讓牠們更優游
              animationDelay: `-${Math.random() * 10}s`,
              scale: Math.random() * 0.3 + 0.4,
              direction: Math.random() > 0.5 ? 1 : -1,
              color1: color.c1,
              color2: color.c2
            };
          }));

          const tropicalFishes = useRef([1, 2, 3].map((type) => ({
            id: Math.random(),
            top: `${Math.random() * 60 + 10}%`,
            animationDuration: `${Math.random() * 15 + 20}s`,
            animationDelay: `-${Math.random() * 20}s`,
            scale: (Math.random() * 0.5 + 1.2) * 0.6, // 縮小為0.6倍
            direction: Math.random() > 0.5 ? 1 : -1,
            hue: Math.floor(Math.random() * 360), // 隨機色彩繽紛
            type: type // 確保3隻不同造型不重複
          })));

          const starfishes = useRef([...Array(6)].map(() => ({
            id: Math.random(),
            left: `${Math.random() * 90 + 5}%`,
            bottom: `${Math.random() * 10 + 2}%`,
            scale: Math.random() * 0.4 + 0.4,
            rotation: Math.random() * 360,
            color: ['#f43f5e', '#fb923c', '#f87171', '#fcd34d'][Math.floor(Math.random() * 4)],
            wobbleDelay: `-${Math.random() * 5}s`
          })));

          const lobster = useRef({
            bottom: `${Math.random() * 5 + 2}%`,
            scale: Math.random() * 0.4 + 1.3, // 放大龍蝦
            animationDuration: `${Math.random() * 20 + 25}s`,
            animationDelay: `-${Math.random() * 15}s`
          });

          const crab = useRef({
            bottom: `${Math.random() * 5 + 2}%`,
            scale: Math.random() * 0.2 + 0.6,
            // 延長動畫時間，讓螃蟹橫行速度大幅放慢
            animationDuration: `${Math.random() * 20 + 35}s`,
            animationDelay: `-${Math.random() * 5}s`
          });

          // 新增：取得並管理共用的音效引擎
          const getAudioCtx = useCallback(() => {
            try {
              if (!audioCtxRef.current) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                  audioCtxRef.current = new AudioContext();
                }
              }
              if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
                audioCtxRef.current.resume();
              }
              return audioCtxRef.current;
            } catch (e) {
              return null;
            }
          }, []);

          const playBubbleSound = useCallback(() => {
            try {
              const ctx = getAudioCtx();
              if (!ctx) return;
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.type = 'sine';
              osc.frequency.setValueAtTime(400, ctx.currentTime);
              osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.1);
              gain.gain.setValueAtTime(0.3, ctx.currentTime);
              gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
              osc.start();
              osc.stop(ctx.currentTime + 0.1);
            } catch (e) {
              console.log("Audio not supported.", e);
            }
          }, [getAudioCtx]);

          const playWinSound = useCallback(() => {
            try {
              const ctx = getAudioCtx();
              if (!ctx) return;
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.type = 'triangle';
              osc.frequency.setValueAtTime(440, ctx.currentTime);
              osc.frequency.setValueAtTime(554, ctx.currentTime + 0.1);
              osc.frequency.setValueAtTime(659, ctx.currentTime + 0.2);
              osc.frequency.setValueAtTime(880, ctx.currentTime + 0.3);
              gain.gain.setValueAtTime(0.2, ctx.currentTime);
              gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
              osc.start();
              osc.stop(ctx.currentTime + 0.8);
            } catch(e){}
          }, [getAudioCtx]);

          const playLoseSound = useCallback(() => {
            try {
              const ctx = getAudioCtx();
              if (!ctx) return;
              const osc = ctx.createOscillator();
              const gain = ctx.createGain();
              osc.connect(gain);
              gain.connect(ctx.destination);
              osc.type = 'sawtooth';
              osc.frequency.setValueAtTime(300, ctx.currentTime);
              osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + 1);
              gain.gain.setValueAtTime(0.3, ctx.currentTime);
              gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 1);
              osc.start();
              osc.stop(ctx.currentTime + 1);
            } catch(e){}
          }, [getAudioCtx]);

          const startGame = () => {
            const newBags = [...Array(15)].map((_, index) => {
              // 20% 機率變成特別大的塑膠袋
              const isGiant = Math.random() > 0.8;
              return {
                id: index,
                x: Math.random() * 80 + 10,
                y: Math.random() * 70 + 15,
                active: true,
                // 更新：改為使用大範圍漂浮的動畫 class
                animClass: `bag-drift-${Math.floor(Math.random() * 3) + 1}`,
                // 更新：延長動畫時間，讓大範圍的漂浮移動變得自然滑順 (10~20秒)
                floatDuration: Math.random() * 10 + 10,
                floatDelay: Math.random() * -10,
                rotation: Math.random() > 0.5 ? (Math.random() * 30 - 15) : (180 + Math.random() * 30 - 15),
                scale: isGiant ? Math.random() * 1.5 + 2.0 : Math.random() * 0.8 + 1.2 // 塑膠袋再放大
              };
            });
            setBags(newBags);
            setTimeLeft(30);
            setGameState('playing');

            if (isMusicOn && audioRef.current) {
              audioRef.current.play().catch(e => console.log("音樂播放被瀏覽器阻擋", e));
            }
          };

          const handleBagClick = (id) => {
            if (gameState !== 'playing') return;
            playBubbleSound();
            setBags(prev => prev.map(bag => 
              bag.id === id ? { ...bag, active: false } : bag
            ));
          };

          useEffect(() => {
            let timer;
            if (gameState === 'playing') {
              timer = setInterval(() => {
                setTimeLeft((prev) => {
                  if (prev <= 1) {
                    clearInterval(timer);
                    return 0;
                  }
                  return prev - 1;
                });
              }, 1000);
            }
            return () => clearInterval(timer);
          }, [gameState]);

          useEffect(() => {
            if (gameState === 'playing') {
              const activeBags = bags.filter(b => b.active).length;
              if (activeBags === 0) {
                setGameState('won');
                playWinSound();
              } else if (timeLeft === 0) {
                setGameState('lost');
                playLoseSound();
              }
            }
          }, [bags, timeLeft, gameState, playWinSound, playLoseSound]);

          const toggleMusic = () => {
            if (isMusicOn && audioRef.current) {
              audioRef.current.pause();
            } else if (!isMusicOn && audioRef.current) {
              audioRef.current.play().catch(e => console.log("音樂播放被瀏覽器阻擋", e));
            }
            setIsMusicOn(!isMusicOn);
          };

          return (
            <div 
              className="relative w-full h-screen overflow-hidden font-sans select-none bg-cover bg-center bg-no-repeat bg-blue-400"
              style={{ backgroundImage: "url('SEA.png')" }}
            >
              <audio ref={audioRef} src="bgm.mp3" loop preload="auto" />

              <button 
                onClick={toggleMusic}
                className="absolute top-4 right-4 z-50 bg-white/90 backdrop-blur-md w-14 h-14 flex items-center justify-center rounded-full shadow-[0_4px_15px_rgba(0,0,0,0.2)] text-2xl hover:scale-110 transition-transform border-4 border-cyan-200 cursor-pointer"
                title={isMusicOn ? "關閉音樂" : "開啟音樂"}
              >
                {isMusicOn ? '🎵' : '🔇'}
              </button>

              <style>{`
                @keyframes swimRight {
                  0% { transform: translateX(-150px) rotate(90deg) scale(var(--scale)); }
                  100% { transform: translateX(120vw) rotate(90deg) scale(var(--scale)); }
                }
                @keyframes swimFishRight {
                  0% { transform: translateX(-150px) scaleX(-1) scale(var(--scale)); }
                  100% { transform: translateX(120vw) scaleX(-1) scale(var(--scale)); }
                }
                @keyframes swimFishLeft {
                  0% { transform: translateX(120vw) scale(var(--scale)); }
                  100% { transform: translateX(-150px) scale(var(--scale)); }
                }
                @keyframes popOut {
                  0% { transform: scale(1); opacity: 1; }
                  50% { transform: scale(1.5); opacity: 0.8; }
                  100% { transform: scale(0); opacity: 0; }
                }
                @keyframes sparkleAnim {
                  0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.8; }
                  50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
                }
                @keyframes gradientBG {
                  0% { background-position: 0% 50%; }
                  50% { background-position: 100% 50%; }
                  100% { background-position: 0% 50%; }
                }

                @keyframes naturalFloat1 {
                  0%, 100% { transform: translate(0, 0) rotate(-3deg); }
                  33% { transform: translate(0.5vw, -3vh) rotate(2deg); }
                  66% { transform: translate(-0.5vw, -1.5vh) rotate(-1deg); }
                }
                @keyframes naturalFloat2 {
                  0%, 100% { transform: translate(0, 0) rotate(4deg); }
                  33% { transform: translate(-0.8vw, -4vh) rotate(-2deg); }
                  66% { transform: translate(0.5vw, -2vh) rotate(1deg); }
                }
                @keyframes naturalFloat3 {
                  0%, 100% { transform: translate(0, 0) rotate(-2deg); }
                  33% { transform: translate(1vw, -5vh) rotate(3deg); }
                  66% { transform: translate(-1vw, -2.5vh) rotate(-1deg); }
                }

                /* 新增：塑膠袋專用的大範圍自然漂浮動畫 */
                @keyframes bagDrift1 {
                  0%, 100% { transform: translate(0, 0) rotate(-10deg); }
                  33% { transform: translate(15vw, -15vh) rotate(15deg); }
                  66% { transform: translate(-10vw, 10vh) rotate(-5deg); }
                }
                @keyframes bagDrift2 {
                  0%, 100% { transform: translate(0, 0) rotate(10deg); }
                  33% { transform: translate(-15vw, 15vh) rotate(-15deg); }
                  66% { transform: translate(10vw, -10vh) rotate(10deg); }
                }
                @keyframes bagDrift3 {
                  0%, 100% { transform: translate(0, 0) rotate(0deg); }
                  33% { transform: translate(10vw, 15vh) rotate(20deg); }
                  66% { transform: translate(-15vw, -15vh) rotate(-10deg); }
                }

                @keyframes drift1 {
                  0%, 100% { transform: translate(0, 0) rotate(0deg); }
                  25% { transform: translate(15vw, -15vh) rotate(15deg); }
                  50% { transform: translate(5vw, -25vh) rotate(-5deg); }
                  75% { transform: translate(-10vw, -10vh) rotate(-15deg); }
                }
                @keyframes drift2 {
                  0%, 100% { transform: translate(0, 0) rotate(0deg); }
                  33% { transform: translate(-15vw, 15vh) rotate(-20deg); }
                  66% { transform: translate(10vw, 20vh) rotate(10deg); }
                }
                @keyframes drift3 {
                  0%, 100% { transform: translate(0, 0) rotate(0deg); }
                  25% { transform: translate(-15vw, -10vh) rotate(-10deg); }
                  50% { transform: translate(10vw, -20vh) rotate(15deg); }
                  75% { transform: translate(20vw, 5vh) rotate(5deg); }
                }
                @keyframes drift4 {
                  0%, 100% { transform: translate(0, 0) rotate(0deg); }
                  33% { transform: translate(20vw, -15vh) rotate(15deg); }
                  66% { transform: translate(-20vw, -5vh) rotate(-15deg); }
                }

                @keyframes mermaidFloat {
                  0%, 100% { transform: translateY(0) rotate(-2deg); }
                  50% { transform: translateY(-15px) rotate(2deg); }
                }

                @keyframes lobsterWalkAnim {
                  0% { transform: translateX(-150px) scale(var(--scale)); }
                  100% { transform: translateX(120vw) scale(var(--scale)); }
                }
                @keyframes lobsterScuttle {
                  0%, 100% { transform: translateY(0) rotate(0deg); }
                  25% { transform: translateY(-3px) rotate(-2deg); }
                  75% { transform: translateY(-3px) rotate(2deg); }
                }

                @keyframes crabWalkAnim {
                  0% { transform: translateX(-10vw) scale(var(--scale)); }
                  50% { transform: translateX(80vw) scale(var(--scale)); }
                  100% { transform: translateX(-10vw) scale(var(--scale)); }
                }

                @keyframes starfishWobble {
                  0%, 100% { transform: scale(var(--scale)) rotate(calc(var(--rot) - 5deg)); }
                  50% { transform: scale(var(--scale)) rotate(calc(var(--rot) + 5deg)); }
                }

                @keyframes gentleBounce {
                  0%, 100% { transform: translateY(-3%); }
                  50% { transform: translateY(3%); }
                }

                .turtle-anim { animation: swimRight linear infinite; }
                .fish-right-anim { animation: swimFishRight linear infinite; }
                .fish-left-anim { animation: swimFishLeft linear infinite; }
                .bag-pop { animation: popOut 0.4s ease-out forwards; }
                .sparkle-anim { animation: sparkleAnim 2s ease-in-out infinite; }
                .mermaid-anim { animation: mermaidFloat 6s ease-in-out infinite; }
                
                .lobster-walk-anim { animation: lobsterWalkAnim linear infinite; }
                .lobster-scuttle-anim { animation: lobsterScuttle 0.5s ease-in-out infinite; }
                .starfish-wobble-anim { animation: starfishWobble 4s ease-in-out infinite; }

                .crab-walk-anim { animation: crabWalkAnim ease-in-out infinite; }
                .crab-wobble-anim { animation: lobsterScuttle 0.4s ease-in-out infinite; }

                .bag-float-anim-1 { animation: naturalFloat1 ease-in-out infinite; }
                .bag-float-anim-2 { animation: naturalFloat2 ease-in-out infinite; }
                .bag-float-anim-3 { animation: naturalFloat3 ease-in-out infinite; }

                /* 新增：對應大範圍漂浮的 class */
                .bag-drift-1 { animation: bagDrift1 ease-in-out infinite alternate; }
                .bag-drift-2 { animation: bagDrift2 ease-in-out infinite alternate; }
                .bag-drift-3 { animation: bagDrift3 ease-in-out infinite alternate; }

                .drift-anim-1 { animation: drift1 ease-in-out infinite alternate; }
                .drift-anim-2 { animation: drift2 ease-in-out infinite alternate; }
                .drift-anim-3 { animation: drift3 ease-in-out infinite alternate; }
                .drift-anim-4 { animation: drift4 ease-in-out infinite alternate; }
              `}</style>
              
              {/* 海星群 */}
              {starfishes.current.map(star => (
                <div key={star.id} className="absolute z-10 pointer-events-none starfish-wobble-anim" style={{
                  left: star.left,
                  bottom: star.bottom,
                  width: '60px', height: '60px',
                  '--scale': star.scale,
                  '--rot': `${star.rotation}deg`,
                  animationDelay: star.wobbleDelay
                }}>
                  <Starfish color={star.color} />
                </div>
              ))}

              {/* 龍蝦 */}
              <div className="absolute z-10 pointer-events-none lobster-walk-anim" style={{
                bottom: lobster.current.bottom,
                animationDuration: lobster.current.animationDuration,
                animationDelay: lobster.current.animationDelay,
                width: '80px', height: '80px',
                '--scale': lobster.current.scale
              }}>
                <div className="lobster-scuttle-anim w-full h-full">
                  <Lobster />
                </div>
              </div>

              {/* 小螃蟹 */}
              <div className="absolute z-10 pointer-events-none crab-walk-anim" style={{
                bottom: crab.current.bottom,
                animationDuration: crab.current.animationDuration,
                animationDelay: crab.current.animationDelay,
                width: '60px', height: '60px',
                '--scale': crab.current.scale
              }}>
                <div className="crab-wobble-anim w-full h-full">
                  <Crab />
                </div>
              </div>

              {/* 魚群 */}
              {fishes.current.map(fish => (
                <div key={fish.id} className={`absolute z-10 pointer-events-none ${fish.direction === 1 ? 'fish-right-anim' : 'fish-left-anim'}`} style={{
                  top: fish.top,
                  width: '60px', height: '60px',
                  animationDuration: fish.animationDuration,
                  animationDelay: fish.animationDelay,
                  '--scale': fish.scale
                }}>
                  <Fish color1={fish.color1} color2={fish.color2} />
                </div>
              ))}

              {/* 大型熱帶魚 */}
              {tropicalFishes.current.map(fish => (
                <div key={fish.id} className={`absolute z-10 pointer-events-none ${fish.direction === 1 ? 'fish-right-anim' : 'fish-left-anim'}`} style={{
                  top: fish.top,
                  width: '120px', height: '100px',
                  animationDuration: fish.animationDuration,
                  animationDelay: fish.animationDelay,
                  '--scale': fish.scale
                }}>
                  <TropicalFish hue={fish.hue} type={fish.type} />
                </div>
              ))}

              {/* 水母群 */}
              {jellyfishes.current.map(jelly => (
                <div key={jelly.id} className={`absolute z-20 pointer-events-none ${jelly.animClass}`} style={{
                  left: jelly.left,
                  top: jelly.top,
                  width: '100px', height: jelly.type === 'long' ? '200px' : '100px',
                  animationDuration: jelly.animationDuration,
                  animationDelay: jelly.animationDelay,
                  transform: `scale(${jelly.scale})`,
                  filter: `hue-rotate(${jelly.hueRotate}) ${jelly.saturate}`,
                  opacity: jelly.opacity
                }}>
                  {jelly.type === 'normal' && <Jellyfish />}
                  {jelly.type === 'long' && <LongTentacleJellyfish />}
                  {jelly.type === 'egg' && <EggYolkJellyfish />}
                </div>
              ))}

              {/* 美人魚 */}
              <div className="absolute z-20 pointer-events-none mermaid-anim" style={{
                bottom: '12%', right: '20%', width: '280px', height: '280px'
              }}>
                <Mermaid />
              </div>

              {/* 海龜群 */}
              {turtles.current.map(turtle => (
                <div key={turtle.id} className="absolute z-30 pointer-events-none turtle-anim" style={{
                  top: turtle.top,
                  width: '120px', height: '120px',
                  animationDuration: turtle.animationDuration,
                  animationDelay: turtle.animationDelay,
                  '--scale': turtle.scale
                }}>
                  <Turtle {...turtle.theme} />
                </div>
              ))}

              {/* 塑膠袋 (遊戲互動目標) */}
              {gameState === 'playing' && bags.map(bag => (
                bag.active ? (
                  <div key={bag.id} className={`absolute z-40 ${bag.animClass}`} style={{
                    left: `${bag.x}%`,
                    top: `${bag.y}%`,
                    width: '60px', height: '60px',
                    animationDuration: `${bag.floatDuration}s`,
                    animationDelay: `${bag.floatDelay}s`
                  }}>
                    <PlasticBag 
                      onClick={() => handleBagClick(bag.id)}
                      className="w-full h-full"
                      style={{
                        transform: `scale(${bag.scale}) rotate(${bag.rotation}deg)`
                      }}
                    />
                  </div>
                ) : (
                  <div key={`pop-${bag.id}`} className="absolute z-40 bag-pop" style={{
                    left: `${bag.x}%`,
                    top: `${bag.y}%`,
                    width: '60px', height: '60px'
                  }}>
                    <div className="w-full h-full rounded-full border-4 border-white opacity-80 sparkle-anim"></div>
                  </div>
                )
              ))}

              {/* UI 介面: 上方計分板與倒數計時 */}
              {gameState === 'playing' && (
                <div className="absolute top-4 left-4 z-50 flex flex-col md:flex-row gap-4">
                  <div className="bg-white/90 backdrop-blur-md px-4 py-2 md:px-6 md:py-3 rounded-2xl shadow-[0_4px_15px_rgba(0,0,0,0.2)] border-4 border-cyan-200">
                    <div className="text-cyan-800 font-bold text-lg md:text-2xl drop-shadow-sm flex items-center gap-2">
                      <span>⏳</span> 剩餘時間: <span className={`${timeLeft <= 10 ? 'text-red-500 animate-pulse' : 'text-cyan-600'} text-xl md:text-3xl`}>{timeLeft}</span> 秒
                    </div>
                  </div>
                  <div className="bg-white/90 backdrop-blur-md px-4 py-2 md:px-6 md:py-3 rounded-2xl shadow-[0_4px_15px_rgba(0,0,0,0.2)] border-4 border-cyan-200">
                    <div className="text-cyan-800 font-bold text-lg md:text-2xl drop-shadow-sm flex items-center gap-2">
                      <span>🛍️</span> 剩餘垃圾: <span className="text-pink-500 text-xl md:text-3xl">{bags.filter(b => b.active).length}</span>
                    </div>
                  </div>
                </div>
              )}

              {/* UI 介面: 遊戲開始畫面 */}
              {gameState === 'start' && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
                  <div className="bg-white/95 p-8 md:p-10 rounded-[2rem] md:rounded-[3rem] shadow-2xl text-center max-w-lg border-8 border-cyan-200 transform hover:scale-105 transition-transform">
                    <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 mb-4 md:mb-6 drop-shadow-md">
                      海龜不吃塑！
                    </h1>
                    <p className="text-lg md:text-2xl text-gray-700 mb-6 md:mb-8 font-bold leading-relaxed">
                      請在 30 秒內<br/>點擊清除所有漂浮的塑膠袋，<br/>保護海洋生物！
                    </p>
                    <button 
                      onClick={startGame}
                      className="bg-gradient-to-r from-cyan-400 to-blue-500 text-white px-8 py-4 md:px-12 md:py-5 rounded-full text-2xl md:text-3xl font-black shadow-[0_6px_0_rgb(6,182,212)] hover:shadow-[0_2px_0_rgb(6,182,212)] hover:translate-y-1 transition-all"
                    >
                      開始遊戲
                    </button>
                  </div>
                </div>
              )}

              {/* UI 介面: 遊戲勝利 */}
              {gameState === 'won' && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-md p-4 overflow-hidden">
                  <div className="absolute w-[200vw] h-[200vw] bg-[conic-gradient(from_0deg,transparent_0deg,rgba(253,224,71,0.3)_30deg,transparent_60deg,rgba(253,224,71,0.3)_90deg,transparent_120deg,rgba(253,224,71,0.3)_150deg,transparent_180deg,rgba(253,224,71,0.3)_210deg,transparent_240deg,rgba(253,224,71,0.3)_270deg,transparent_300deg,rgba(253,224,71,0.3)_330deg,transparent_360deg)] animate-[spin_10s_linear_infinite]"></div>
                  
                  {/* 灑花效果 */}
                  <div className="absolute inset-0 pointer-events-none overflow-hidden z-10">
                    {[...Array(20)].map((_, i) => (
                      <div key={i} className="absolute text-2xl md:text-4xl" style={{
                        left: `${Math.random() * 100}%`,
                        top: `-${Math.random() * 20}%`,
                        animation: `naturalFloat1 ${Math.random() * 3 + 2}s linear infinite`,
                        animationDelay: `${Math.random() * 5}s`,
                        transform: `scale(${Math.random() * 0.5 + 0.5})`
                      }}>
                        {['🌸', '🌺', '🌼', '✨'][Math.floor(Math.random() * 4)]}
                      </div>
                    ))}
                  </div>

                  <div className="relative bg-gradient-to-br from-white to-green-50 p-8 md:p-12 rounded-[3rem] shadow-[0_0_80px_rgba(74,222,128,0.8)] text-center max-w-xl border-[12px] border-green-300 transform z-20" style={{ animation: 'gentleBounce 3s ease-in-out infinite' }}>
                    <div className="flex justify-center mb-6">
                      <Turtle className="w-32 h-32 md:w-40 md:h-40" emotion="happy" />
                    </div>
                    <h2 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600 mb-4 drop-shadow-md">海洋守護者！🌊</h2>
                    <p className="text-2xl md:text-3xl text-green-800 mb-8 font-extrabold drop-shadow-sm leading-relaxed">太棒了！<br/>你清除了所有的塑膠袋，<br/>讓海龜有個安全的家！✨</p>
                    <button 
                      onClick={startGame}
                      className="bg-gradient-to-r from-green-400 to-emerald-500 text-white px-10 py-4 rounded-full text-2xl md:text-3xl font-black shadow-[0_8px_0_rgb(5,150,105)] hover:shadow-[0_4px_0_rgb(5,150,105)] hover:translate-y-2 transition-all"
                    >
                      再玩一次 🐢
                    </button>
                  </div>
                </div>
              )}

              {/* UI 介面: 遊戲失敗 */}
              {gameState === 'lost' && (
                <div className="absolute inset-0 z-50 flex items-center justify-center bg-slate-800/70 backdrop-blur-md p-4">
                  <div className="relative bg-gradient-to-b from-slate-600 to-slate-800 p-8 md:p-12 rounded-[3rem] shadow-[0_0_80px_rgba(100,116,139,0.5)] text-center max-w-xl border-[12px] border-slate-500/50">
                    <div className="flex justify-center mb-6 relative">
                      <div className="absolute -top-6 text-5xl md:text-6xl animate-bounce">💀</div>
                      <Turtle 
                        className="w-32 h-32 md:w-40 md:h-40 opacity-70 grayscale" 
                        emotion="crying" 
                        baseColor="#94a3b8" 
                        shellColor="#475569" 
                        scuteColor="#1e293b" 
                        skinDetail="#64748b" 
                      />
                    </div>
                    <h2 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-gray-200 to-gray-400 mb-4 drop-shadow-md">一片死寂...</h2>
                    <p className="text-2xl md:text-3xl text-gray-200 mb-8 font-extrabold drop-shadow-sm leading-relaxed">塑膠袋留在了海裡...<br/>海洋失去了生機！🥀</p>
                    <button 
                      onClick={startGame}
                      className="bg-gradient-to-r from-slate-500 to-slate-700 text-white px-10 py-4 rounded-full text-2xl md:text-3xl font-black shadow-[0_8px_0_rgb(71,85,105)] hover:shadow-[0_4px_0_rgb(71,85,105)] hover:translate-y-2 transition-all"
                    >
                      再試一次 ♻️
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
